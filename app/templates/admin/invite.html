{% extends "base.html" %}
{% block title %}Inviter un utilisateur{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto space-y-6">
    <div>
        <a href="{{ url_for('admin.index') }}" class="text-sm text-blue-600 hover:text-blue-700">
            ← Retour à l'administration
        </a>
        <h1 class="text-2xl font-bold text-gray-900 mt-2">Inviter un utilisateur</h1>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <p class="text-sm text-gray-600 mb-5">
            Un email d'invitation sera envoyé avec un lien pour créer un compte.
            Le lien est valable 7 jours.
        </p>
        <form method="POST" action="{{ url_for('admin.invite') }}" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                    Adresse email à inviter <span class="text-red-500">*</span>
                </label>
                <input type="email" id="email" name="email" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="nouveau@exemple.com">
            </div>
            <div class="flex space-x-3">
                <button type="submit"
                        class="flex-1 py-2.5 px-4 bg-green-600 hover:bg-green-700 text-white
                               font-medium rounded-lg text-sm transition-colors">
                    Envoyer l'invitation
                </button>
                <a href="{{ url_for('admin.index') }}"
                   class="flex-1 py-2.5 px-4 bg-gray-100 hover:bg-gray-200 text-gray-700
                          font-medium rounded-lg text-sm transition-colors text-center">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
