{% extends "base.html" %}
{% block title %}Mot de passe oublié{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <div class="text-5xl mb-4">🔑</div>
            <h1 class="text-2xl font-bold text-gray-900">Mot de passe oublié</h1>
            <p class="mt-2 text-gray-600">Entrez votre email pour recevoir un lien de réinitialisation</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
            <form method="POST" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                        Adresse email
                    </label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm
                                  focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="vous@exemple.com">
                </div>
                <button type="submit"
                        class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white
                               font-medium rounded-lg text-sm transition-colors">
                    Envoyer le lien
                </button>
            </form>
            <div class="mt-4 text-center">
                <a href="{{ url_for('auth.login') }}" class="text-sm text-blue-600 hover:text-blue-700">
                    ← Retour à la connexion
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
