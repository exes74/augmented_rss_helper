{% extends "base.html" %}
{% block title %}Connexion{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
    <div class="max-w-md w-full space-y-8">
        <!-- En-tête -->
        <div class="text-center">
            <div class="text-5xl mb-4">📰</div>
            <h1 class="text-3xl font-bold text-gray-900">RSS Veille</h1>
            <p class="mt-2 text-gray-600">Votre veille intelligente avec synthèses IA</p>
        </div>

        <!-- Formulaire -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
            <h2 class="text-xl font-semibold text-gray-900 mb-6">Connexion</h2>
            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                        Adresse email
                    </label>
                    <input type="email" id="email" name="email" required autocomplete="email"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm
                                  focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           placeholder="vous@exemple.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                        Mot de passe
                    </label>
                    <input type="password" id="password" name="password" required
                           autocomplete="current-password"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm
                                  focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           placeholder="••••••••">
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" name="remember"
                               class="w-4 h-4 text-blue-600 border-gray-300 rounded">
                        <span class="text-sm text-gray-600">Se souvenir de moi</span>
                    </label>
                    <a href="{{ url_for('auth.forgot_password') }}"
                       class="text-sm text-blue-600 hover:text-blue-700">
                        Mot de passe oublié ?
                    </a>
                </div>

                <button type="submit"
                        class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white
                               font-medium rounded-lg text-sm transition-colors">
                    Se connecter
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    Pas encore de compte ?
                    <a href="{{ url_for('auth.register') }}"
                       class="text-blue-600 hover:text-blue-700 font-medium">
                        S'inscrire
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
