{% extends "base.html" %}
{% block title %}Inscription{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <div class="text-5xl mb-4">📰</div>
            <h1 class="text-3xl font-bold text-gray-900">RSS Veille</h1>
            <p class="mt-2 text-gray-600">Créer votre compte</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
            {% if invited_email %}
            <div class="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg">
                <p class="text-sm text-green-800">
                    ✅ Vous avez été invité(e). Votre email est pré-rempli.
                </p>
            </div>
            {% endif %}

            <h2 class="text-xl font-semibold text-gray-900 mb-6">Créer un compte</h2>
            <form method="POST" action="{{ url_for('auth.register') }}{% if request.args.get('token') %}?token={{ request.args.get('token') }}{% endif %}" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                        Adresse email
                    </label>
                    <input type="email" id="email" name="email" required
                           value="{{ invited_email or '' }}"
                           {% if invited_email %}readonly{% endif %}
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm
                                  focus:outline-none focus:ring-2 focus:ring-blue-500
                                  {% if invited_email %}bg-gray-50{% endif %}">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                        Mot de passe
                    </label>
                    <input type="password" id="password" name="password" required minlength="8"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm
                                  focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="Minimum 8 caractères">
                </div>

                <div>
                    <label for="password_confirm" class="block text-sm font-medium text-gray-700 mb-1">
                        Confirmer le mot de passe
                    </label>
                    <input type="password" id="password_confirm" name="password_confirm" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm
                                  focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="••••••••">
                </div>

                <button type="submit"
                        class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white
                               font-medium rounded-lg text-sm transition-colors">
                    Créer mon compte
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    Déjà un compte ?
                    <a href="{{ url_for('auth.login') }}"
                       class="text-blue-600 hover:text-blue-700 font-medium">
                        Se connecter
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
