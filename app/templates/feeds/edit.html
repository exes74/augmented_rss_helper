{% extends "base.html" %}
{% block title %}Modifier le flux{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
    <div>
        <a href="{{ url_for('feeds.index') }}" class="text-sm text-blue-600 hover:text-blue-700">
            ← Retour aux flux
        </a>
        <h1 class="text-2xl font-bold text-gray-900 mt-2">Modifier le flux</h1>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <div class="mb-4 p-3 bg-gray-50 rounded-lg">
            <p class="text-xs text-gray-500">URL du flux</p>
            <p class="text-sm font-mono text-gray-700 break-all">{{ feed.url }}</p>
        </div>

        <form method="POST" action="{{ url_for('feeds.edit', feed_id=feed.id) }}" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
                    Nom du flux
                </label>
                <input type="text" id="name" name="name" value="{{ feed.name or '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label for="category_id" class="block text-sm font-medium text-gray-700 mb-1">
                    Catégorie
                </label>
                <select id="category_id" name="category_id"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm
                               focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="">— Sans catégorie —</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if feed.category_id == cat.id %}selected{% endif %}>
                        {{ cat.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex space-x-3 pt-2">
                <button type="submit"
                        class="flex-1 py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white
                               font-medium rounded-lg text-sm transition-colors">
                    Enregistrer
                </button>
                <a href="{{ url_for('feeds.index') }}"
                   class="flex-1 py-2.5 px-4 bg-gray-100 hover:bg-gray-200 text-gray-700
                          font-medium rounded-lg text-sm transition-colors text-center">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
